name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - '_eex/**'
      - '_pages/**'
      - '_posts/**'
      - 'config/**'
      - 'extra/**'
      - 'lib/**'
      - 'build.js'
      - 'package.json'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DCHOOK_VERSION: v1.2.3
  DCHOOK_BASE: 'dchook_Linux_x86_64'
  DCHOOK_URL: https://dch.halostatue.ca
  DOCKER_HUB_USERNAME: halostatue

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push container images to GHCR

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
          # disable-sudo: true
          # egress-policy: block
          # allowed-endpoints: >
          #   api.github.com:443
          #   ghcr.io:443
          #   github.com:443
          #   pkg-containers.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYY.MMDD.HHmm' tz='UTC'}}
            type=sha,prefix=git-

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Check deployment notify
        id: check-notify
        run: |
          if [[ -n "${DCHOOK_URL}" ]] && [[ -n "${DCHOOK_SECRET}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi
        env:
          DCHOOK_SECRET: ${{ secrets.DCHOOK_SECRET }}

      - name: Install dchook-notify
        if: steps.check-notify.outputs.enabled == 'true'
        run: |
          gh release download "${DCHOOK_VERSION}" \
            --repo halostatue/dchook \
            --pattern "${DCHOOK_BASE}.tar.gz"
          gh attestation verify "${DCHOOK_BASE}.tar.gz" \
            --repo halostatue/dchook
          tar -xzf "${DCHOOK_BASE}.tar.gz" \
            --strip-components=1 \
            -C /usr/local/bin \
            "${DCHOOK_BASE}/dchook-notify"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger deployment
        if: steps.check-notify.outputs.enabled == 'true'
        env:
          DCHOOK_SECRET: ${{ secrets.DCHOOK_SECRET }}
          METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          echo "$DCHOOK_SECRET" > webhook_secret.txt
          chmod 400 webhook_secret.txt

          LABELS=$(echo "$METADATA_JSON" | jq '.labels | with_entries(select(.key | startswith("org.opencontainers.image")))')
          IMAGE=$(echo "$METADATA_JSON" | jq -r '.tags[0]')

          echo "$LABELS" | jq --arg image "$IMAGE" '. + {image: $image}' |
            dchook-notify -s webhook_secret.txt -

      - name: Clean up old images
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
        with:
          package-name: ${{ github.event.repository.name }}
          package-type: "container"
          min-versions-to-keep: 3
        continue-on-error: true
